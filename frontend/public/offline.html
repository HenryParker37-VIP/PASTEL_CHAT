<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#FFB6C1" />
  <title>Pastel Chat – Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FFF0F5 0%, #E8D5FF 100%);
      font-family: 'Inter', system-ui, sans-serif;
      color: #6B4E8B;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 1rem; opacity: 0.75; max-width: 280px; line-height: 1.6; margin-bottom: 2rem; }
    button {
      background: #C89ED4;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">💬</div>
  <h1>You're offline</h1>
  <p>Check your connection and try again. Your messages will send once you're back online.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
