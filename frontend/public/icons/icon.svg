<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#FFF0F5"/>
  <!-- Gradient bubble -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB6C1"/>
      <stop offset="100%" stop-color="#C89ED4"/>
    </linearGradient>
  </defs>
  <!-- Chat bubble body -->
  <rect x="80" y="120" width="310" height="210" rx="50" fill="url(#g)"/>
  <!-- Tail -->
  <polygon points="140,330 100,400 200,340" fill="url(#g)"/>
  <!-- Dots -->
  <circle cx="175" cy="225" r="22" fill="#fff" opacity="0.9"/>
  <circle cx="256" cy="225" r="22" fill="#fff" opacity="0.9"/>
  <circle cx="337" cy="225" r="22" fill="#fff" opacity="0.9"/>
</svg>
